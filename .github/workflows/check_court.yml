name: Court Page Keyword Monitor

on:
  schedule:
    - cron: '0 * * * *' # Runs automatically every hour
  workflow_dispatch:   # Allows manual trigger with custom inputs
    inputs:
      keywords:
        description: 'Keywords to check (separate with commas)'
        required: False
        default: 'Criminal, Interim Order, Bail'
      match_all:
        description: 'Require ALL keywords to match? (true/false)'
        required: False
        default: 'false'

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Google Chrome and dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        pip install selenium beautifulsoup4 webdriver-manager

    - name: Execute Check Script
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # Reads from the manual input box if available, otherwise uses defaults
        INPUT_KEYWORDS: ${{ github.event.inputs.keywords }}
        INPUT_MATCH_ALL: ${{ github.event.inputs.match_all }}
      run: python court_checker.py
