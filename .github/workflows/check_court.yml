name: Court Page Keyword Monitor

on:
  schedule:
    # Runs every hour. (You can adjust this using cron syntax)
    - cron: '0 * * * *'
  workflow_dispatch: # Allows you to also trigger it manually with a button click

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Google Chrome and dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        pip install selenium beautifulsoup4 webdriver-manager

    - name: Execute Check Script
      env:
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
      run: python court_checker.py
