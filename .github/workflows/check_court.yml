name: Court Page Keyword Monitor

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      keywords:
        description: 'Keywords to check'
        required: False
        default: 'tung, Criminal'
      match_all:
        description: 'Match ALL keywords?'
        required: False
        default: 'false'

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install parser package
      run: pip install beautifulsoup4

    - name: Execute Check Script
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        INPUT_KEYWORDS: ${{ github.event.inputs.keywords }}
        INPUT_MATCH_ALL: ${{ github.event.inputs.match_all }}
      run: python court_checker.py
